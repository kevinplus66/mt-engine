# 生产模式 - 适合分享部署
# 使用方法: docker compose up -d

services:
  mt-engine:
    build: .
    container_name: mt-engine
    # 使用 .env 中的 PUID/PGID，解决 NAS 权限问题
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - ./data:/app/data
      - ${DOWNLOADS_PATH:-/downloads}:/downloads:ro
    environment:
      - MT_TOKEN=${MT_TOKEN}
      - MT_USER_ID=${MT_USER_ID}
      - MT_SITE_URL=${MT_SITE_URL:-https://kp.m-team.cc}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-300}
      - RIVAL_USER_ID=${RIVAL_USER_ID:-}
      - PUSHPLUS_TOKEN=${PUSHPLUS_TOKEN:-}
      - QBITTORRENT_URL=${QBITTORRENT_URL:-}
      - QBITTORRENT_USER=${QBITTORRENT_USER:-}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
      - PILOT_SAVE_PATH=${PILOT_SAVE_PATH:-}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5050/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
